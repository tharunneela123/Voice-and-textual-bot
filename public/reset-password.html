<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Mitra</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/chat.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark, #0a0a0c);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main, #e2e8f0);
            margin: 0;
            overflow: hidden;
        }

        .auth-modal {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }


        h2 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #6366f1;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .modal-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #messageBox {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        #messageBox.success { color: #10b981; }
        #messageBox.error { color: #ef4444; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: white;
        }

    </style>
</head>
<body>

    <div class="auth-modal">
        <div class="logo" style="justify-content: center; margin-bottom: 24px;">
            <div class="logo-icon"></div>
            <span>AI Mitra</span>
        </div>
        <h2>Reset Your Password</h2>
        
        <form id="resetForm">
            <div class="input-group">
                <label for="newPassword">New Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="newPassword" placeholder="••••••••" required style="flex: 1; padding-right: 60px;">
                    <button type="button" class="toggle-password-btn" data-target="newPassword" style="position: absolute; right: 12px; background: transparent; border: none; color: #6366f1; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 4px;">Show</button>
                </div>
                <div class="error-msg" id="passwordError"></div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm New Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required style="flex: 1; padding-right: 60px;">
                    <button type="button" class="toggle-password-btn" data-target="confirmPassword" style="position: absolute; right: 12px; background: transparent; border: none; color: #6366f1; font-size: 0.85rem; font-weight: 600; cursor: pointer; padding: 4px;">Show</button>
                </div>
                <div class="error-msg" id="confirmError"></div>
            </div>

            <button type="submit" class="modal-btn" id="submitBtn">Update Password</button>
        </form>

        <div id="messageBox"></div>

        <a href="/" class="back-link">Return to Login</a>
    </div>

    <script>
        // Restore Theme
        const savedTheme = localStorage.getItem('theme') || 'solarized-dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.body.setAttribute('data-theme', savedTheme);

        // Password visibility toggle
        document.querySelectorAll('.toggle-password-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    btn.innerText = 'Hide';
                } else {
                    passwordInput.type = 'password';
                    btn.innerText = 'Show';
                }
            });
        });

        // Utilities
        function validatePassword(pwd) {
            return /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*?&_.\-]{8,}$/.test(pwd);
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.innerText = message;
            el.style.display = 'block';
        }

        function hideErrors() {
            document.getElementById('passwordError').style.display = 'none';
            document.getElementById('confirmError').style.display = 'none';
        }

        function showMessage(msg, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.innerText = msg;
            msgBox.className = type; // 'success' or 'error'
        }

        // Main logic
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideErrors();
            showMessage('', '');

            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const authToken = localStorage.getItem('token');
            
            const isUpdateMode = !urlToken && authToken;

            if (!urlToken && !authToken) {
                showMessage('No reset token found in the URL. Please use the link sent to your email or log in first.', 'error');
                return;
            }

            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            let isValid = true;

            if (!validatePassword(password)) {
                showError('passwordError', 'Min 8 chars, must include letters and numbers');
                isValid = false;
            }

            if (password !== confirmPassword) {
                showError('confirmError', 'Passwords do not match');
                isValid = false;
            }

            if (!isValid) return;

            btn.disabled = true;
            btn.innerText = 'Updating...';

            try {
                let endpoint = '/api/auth/reset-password';
                let bodyData = { token: urlToken, password };
                let headers = { 'Content-Type': 'application/json' };

                if (isUpdateMode) {
                    endpoint = '/api/user/update-password';
                    bodyData = { password };
                    headers['Authorization'] = `Bearer ${authToken}`;
                }

                const response = await fetch(endpoint, {
                    method: isUpdateMode ? 'PUT' : 'POST',
                    headers: headers,
                    body: JSON.stringify(bodyData)
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message || 'Password successfully updated!', 'success');
                    document.getElementById('resetForm').reset();
                    // Redirect to login or home after a few seconds
                    setTimeout(() => window.location.href = '/', 3000);
                } else {
                    showMessage(data.error || 'Failed to update password.', 'error');
                }
            } catch (error) {
                showMessage('Server connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Update Password';
            }
        });
    </script>
</body>
</html>
